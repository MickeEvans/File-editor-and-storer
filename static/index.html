<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workspace</title>
  <link rel="stylesheet" href="/static/vendor/easymde.min.css">
  <link rel="stylesheet" href="/static/vendor/font-awesome/css/font-awesome.min.css">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div id="sidebar-header">
        <span id="workspace-name" title="Click to select the workspace root">Workspace</span>
        <span id="sidebar-actions">
          <button id="add-file-btn" title="New file">&#65291; File</button>
          <button id="add-folder-btn" title="New folder">&#65291; Folder</button>
          <button id="pick-workspace-btn" title="Choose workspace folder&hellip;">&#128194;</button>
          <button id="rescan-btn" title="Re-scan workspace into the index">&#x21bb;</button>
        </span>
      </div>
      <div id="sidebar-error" hidden></div>
      <div id="create-row" hidden>
        <input id="create-input" type="text" spellcheck="false" autocomplete="off">
        <div id="create-hint"></div>
        <div id="create-error" hidden></div>
      </div>
      <nav id="tree"></nav>
    </aside>

    <main id="main">
      <div id="tabbar">
        <span id="current-file" class="placeholder">No file open</span>
        <span id="current-type"></span>
        <span id="dirty-dot" hidden title="Unsaved changes">&#9679;</span>
        <div id="tabbar-right">
          <div id="view-toggle" hidden>
            <span id="toggle-thumb"></span>
            <button id="toggle-a" class="active"></button>
            <button id="toggle-b"></button>
          </div>
          <button id="save-btn" hidden>Save</button>
          <button id="chat-toggle-btn" title="Toggle the folder agent">Agent</button>
        </div>
      </div>
      <div id="content">
        <div id="empty-state">
          <h1>Unified Workspace</h1>
          <p>Notes &middot; Slides &middot; Data — pick a file on the left.</p>
        </div>
        <div id="editor-pane" hidden>
          <textarea id="md-textarea"></textarea>
        </div>
        <textarea id="text-editor" hidden spellcheck="false"></textarea>
        <iframe id="html-preview" hidden sandbox="allow-scripts"></iframe>
        <div id="grid-pane" hidden>
          <table id="csv-grid"></table>
        </div>
      </div>
    </main>

    <aside id="chat-panel" hidden>
      <div id="chat-header">
        <div>
          <div id="chat-title">Agent</div>
          <div id="chat-scope">Scope: /</div>
        </div>
        <button id="chat-clear-btn" title="Clear this folder's chat history">&#128465;</button>
      </div>
      <div id="chat-messages"></div>
      <div id="chat-actions">
        <button id="chat-summarize-btn">Summarize this folder</button>
      </div>
      <div id="chat-input-row">
        <div id="chat-autocomplete" hidden></div>
        <textarea id="chat-input" rows="2" placeholder="Ask about this folder&hellip; (@ to reference a file)"></textarea>
        <button id="chat-send-btn">Send</button>
      </div>
    </aside>
  </div>

  <script src="/static/vendor/easymde.min.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
